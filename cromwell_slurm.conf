# cromwell_slurm.conf
# Slurm backend config for Cromwell + Singularity/Apptainer
# Key features:
# - uses sbatch/squeue/scancel
# - supports docker runtime via singularity/apptainer "docker://" images
# - allows passing optional Slurm flags through runtime attributes:
#     queue:   "--partition=debug" (or "--partition=short")
#     account: "--account=myacct"
#     time:    "--time=00:30:00"

backend {
  default = "slurm"

  providers {
    slurm {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"

      config {
        # Base execution root for call directories.
        # Keep it under the submit dir so everything lands in your project folder.
        root = "cromwell-executions"

        # Localize/copy strategy
        filesystems {
          local {
            localization = [
              "hard-link", "soft-link", "copy"
            ]
          }
        }

        # A WDL task's 'runtime' block can provide these attributes.
        # IMPORTANT: use "" defaults so missing values don’t produce invalid sbatch flags.
        runtime-attributes = """
          String docker
          Int cpu = 1
          String memory = "2G"
          String queue = ""
          String account = ""
          String time = ""
        """

        # Submit each task as a Slurm batch job.
        # ${queue}/${account}/${time} are "raw sbatch flags" strings like:
        #   queue="--partition=debug"
        #   account="--account=myacct"
        #   time="--time=00:10:00"
        #
        # If you leave them empty, they simply expand to nothing.
        submit = """
          sbatch \
            --parsable \
            --job-name=${job_name} \
            --cpus-per-task=${cpu} \
            --mem=${memory} \
            ${time} \
            ${queue} \
            ${account} \
            --output=${cwd}/slurm-%j.out \
            --wrap "bash ${script}"
        """

        # Polling / status
        # Cromwell expects these exit codes:
        # - 0 means "job still running / found"
        # - 1 means "job not found / finished" (varies)
        # This pattern is widely used and works for most Slurm installs.
        check-alive = "squeue -j ${job_id} -h >/dev/null 2>&1"
        kill = "scancel ${job_id}"

        # Cromwell uses this to decide whether a job is running, done, failed, etc.
        # Parse job state from squeue; if missing from squeue, Cromwell will treat it as done.
        # States like R, PD, CG, CD, F, CA, TO are common.
        status = """
          squeue -j ${job_id} -h -o %T | head -n 1
        """

        # Where Cromwell runs the task command script from.
        # SFS backend uses per-call working dirs; ${cwd} is set by Cromwell.
        # Nothing else needed here.

        # ---- Docker via Singularity/Apptainer ----
        # If your WDL task has runtime { docker: "image:tag" }, Cromwell can run it
        # inside singularity/apptainer by pulling docker://image:tag.
        #
        # NOTE: Your *environment* should set these (recommended) to speed up pulls:
        #   SINGULARITY_CACHEDIR=/scratch/$USER/singularity_cache
        #   SINGULARITY_TMPDIR=/scratch/$USER/singularity_tmp
        docker {
          enabled = true

          # Try apptainer first; fall back to singularity.
          # This wrapper ensures it works on clusters with either tool.
          # (Cromwell will substitute ${docker} with your runtime docker image)
          run = """
            if command -v apptainer >/dev/null 2>&1; then
              apptainer exec --containall --bind ${cwd}:${cwd} docker://${docker} bash ${script}
            else
              singularity exec --containall --bind ${cwd}:${cwd} docker://${docker} bash ${script}
            fi
          """
        }
      }
    }
  }
}